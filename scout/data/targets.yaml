# scout target registry — curated protocol intelligence database.
#
# Schema:
#   name:            (required) protocol name
#   chain:           single chain id, or "multi" for cross-chain
#   category:        bridge | dex | lending | l2 | infra | defi | nft | social
#   confidence:      high | medium | low | claimed
#   contracts:       list of key contract addresses to interact with
#   criteria:        free-form dict of fit criteria (consumed by FitScorer)
#   tags:            list of free-form tags for cross-cutting filters
#   notes:           why this target is on the list
#   priority_score:  0-10 manual curation score

targets:
